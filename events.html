  <div class="wrap">
    <p class="page-head__crumb"><a href="index.html">ホーム</a> ／ イベント一覧</p>
    <p class="page-head roma" style="margin:0">Events</p>
    <h1>イベント一覧</h1>
  </div>
</div>

<div class="wrap">
  <form class="searchbar" id="filterbar">
    <div class="field">
      <label for="f-pref">エリア（県）</label>
      <select id="f-pref" name="pref"><option value="">すべての県</option></select>
    </div>
    <div class="field">
      <label for="f-org">主催</label>
      <select id="f-org" name="org">
        <option value="">すべての主催</option>
        <option value="center">県センター</option>
        <option value="city">自治体</option>
        <option value="public">公的団体</option>
        <option value="bank">地銀連携</option>
      </select>
    </div>
    <div class="field">
      <label for="f-tag">こだわり</label>
      <select id="f-tag" name="tag"><option value="">指定なし</option></select>
    </div>
    <div class="field">
      <label for="f-q">キーワード</label>
      <input id="f-q" name="q" type="search" placeholder="例：温泉、20代…">
    </div>
    <button class="btn btn--ghost" type="reset" id="reset">条件をクリア</button>
  </form>
</div>

<section class="section" style="padding-top:2rem">
  <div class="wrap">
    <p id="result-count" style="color:var(--ink-soft);font-size:.92rem;margin-bottom:1.2rem"></p>
    <div class="ev-grid" id="list"></div>
    <div id="empty" class="empty" hidden>
      <div class="empty__ic">🔍</div>
      <p>条件に合うイベントが見つかりませんでした。<br>条件をゆるめてお試しください。</p>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap site-footer__bottom" style="border-top:none">
    <span>© <span id="year"></span> 縁結びナビ / En-musubi Navi</span>
    <span><a href="about.html">このサイトについて</a> ／ <a href="post.html">掲載のご依頼</a></span>
  </div>
</footer>

<script src="assets/js/data.js?v=9"></script>
<script src="assets/js/app.js?v=9"></script>
<script>
  const fPref = $("#f-pref"), fOrg = $("#f-org"), fTag = $("#f-tag"), fQ = $("#f-q");
  fPref.insertAdjacentHTML("beforeend", prefOptionsHTML());
  [...new Set(EVENTS.flatMap(e => e.tags))].sort().forEach(t => fTag.insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`));

  // URLパラメータを初期値に反映
  ["pref","org","tag","q"].forEach(k => {
    const v = getParam(k);
    if (v) { const el = $("#f-" + k); if (el) el.value = v; }
  });

  function render() {
    const pref = fPref.value, org = fOrg.value, tag = fTag.value, q = fQ.value.trim().toLowerCase();
    let list = EVENTS.filter(e => {
      if (pref && e.pref !== pref) return false;
      if (org && e.orgType !== org) return false;
      if (tag && !e.tags.includes(tag)) return false;
      if (q) {
        const hay = (e.title + e.summary + e.organizer + e.city + e.tags.join(" ")).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    }).sort(byDateUpcoming);

    $("#result-count").textContent = `${list.length} 件のイベント`;
    $("#list").innerHTML = list.map(eventCard).join("");
    $("#empty").hidden = list.length > 0;
  }

  ["change","input"].forEach(ev => $("#filterbar").addEventListener(ev, render));
  $("#reset").addEventListener("click", () => setTimeout(render, 0));
  render();
</script>
</body>
