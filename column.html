<body>

<header class="site-header">
  <div class="wrap site-header__in">
    <a class="brand" href="index.html"><span class="brand__mark">縁</span><span><span class="brand__name">縁結びナビ</span><br><span class="brand__sub">En-musubi Navi</span></span></a>
    <button class="nav-toggle" aria-label="メニュー" aria-expanded="false"><span></span><span></span><span></span></button>
    <nav class="site-nav">
      <a href="index.html">ホーム</a>
      <a href="events.html">イベント一覧</a>
      <a href="prefecture.html">県から探す</a>
      <a href="columns.html">コラム</a>
      <a href="about.html">このサイトは</a>
    </nav>
  </div>
</header>

<main class="section">
  <div class="wrap" id="content"></div>
</main>

<footer class="site-footer">
  <div class="wrap site-footer__bottom" style="border-top:none">
    <span>© <span id="year"></span> 縁結びナビ / En-musubi Navi</span>
    <span><a href="about.html">このサイトについて</a> ／ <a href="post.html">掲載のご依頼</a></span>
  </div>
</footer>

<script src="assets/js/data.js?v=10"></script>
<script src="assets/js/app.js?v=10"></script>
<script>
  const id = getParam("id");
  const c = COLUMNS.find(x => x.id === id);
  const box = $("#content");

  if (!c) {
    box.innerHTML = `<div class="empty"><div class="empty__ic">🤔</div>
      <p>お探しのコラムが見つかりませんでした。</p>
      <p style="margin-top:1rem"><a class="btn btn--primary" href="columns.html">コラム一覧へ</a></p></div>`;
  } else {
    document.title = `${c.title} ｜ 縁結びナビ`;
    const others = COLUMNS.filter(x => x.id !== c.id).slice(0,3);
    box.innerHTML = `
      <article class="article">
        <p class="page-head__crumb"><a href="index.html">ホーム</a> ／ <a href="columns.html">コラム</a> ／ ${c.category}</p>
        <p style="margin:.8rem 0 0"><span class="col-card__cat" style="display:inline-block">${c.category}</span></p>
        <h1 style="font-family:var(--serif);font-size:clamp(1.6rem,4.5vw,2.4rem);line-height:1.4;margin:.6rem 0">${c.title}</h1>
        <p style="font-family:var(--latin);color:var(--ink-soft)">${fmtDate(c.date)}</p>

        <div style="margin:1.6rem 0">${sponsorHTML('lead')}</div>

        <p style="font-size:1.12rem;font-weight:500;color:var(--ink);border-left:4px solid var(--thread);padding-left:1rem">${c.excerpt}</p>
        ${c.body}

        ${c.affiliate ? `
        <div class="aff-box">
          <h4>💍 本気で出会いを探すなら</h4>
          <p>公的イベントで場慣れしたら、お住まいのエリア対応の結婚相談所・マッチングサービスもチェック。無料カウンセリングから始められます。</p>
          <a class="btn btn--ink" href="#" rel="sponsored noopener" target="_blank">おすすめサービスを見る（PR）→</a>
        </div>` : ""}

        <p>気になるイベントが見つかったら、さっそく<a href="events.html" style="color:var(--thread);font-weight:700">イベント一覧</a>から探してみましょう。</p>
      </article>

      <section class="section" style="padding-bottom:0">
        <div class="wrap" style="padding:0">
          <div class="sec-head"><span class="sec-head__kicker">Read more</span><h2 class="sec-head__title">他のコラム</h2></div>
          <div class="col-grid">${others.map(columnCard).join("")}</div>
        </div>
      </section>
    `;
  }
</script>
</body>
</html>
