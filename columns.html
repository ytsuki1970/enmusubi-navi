<script>
  const cats = ["すべて", ...new Set(COLUMNS.map(c => c.category))];
  let active = "すべて";
  const sorted = [...COLUMNS].sort((a,b) => b.date.localeCompare(a.date));

  function renderCats() {
    $("#cat-filter").innerHTML = cats.map(c =>
      `<button class="chip ${c===active?'chip--soon':'chip--pref'}" style="padding:.45rem 1rem;font-size:.85rem;border:${c===active?'none':'1px solid var(--line)'};cursor:pointer" data-cat="${c}">${c}</button>`
    ).join("");
  }
  function renderList() {
    const list = active === "すべて" ? sorted : sorted.filter(c => c.category === active);
    $("#col-list").innerHTML = list.map(columnCard).join("");
  }
  $("#cat-filter").addEventListener("click", e => {
    const b = e.target.closest("[data-cat]"); if (!b) return;
    active = b.dataset.cat; renderCats(); renderList();
  });
  renderCats(); renderList();
</script>
